source = { editable = "." }
dependencies = [
    { name = "packaging" },
]

[package.dev-dependencies]
basedpyright = [
    { name = "basedpyright" },
]
cog = [
    { name = "cogapp", marker = "python_full_version >= '3.14'" },
]
dev = [
    { name = "mypy", extra = ["faster-cache"], marker = "python_full_version >= '3.14'" },
    { name = "nox", marker = "python_full_version >= '3.14'" },
    { name = "pylint", marker = "python_full_version >= '3.14'" },
    { name = "pytest", marker = "python_full_version >= '3.14'" },
    { name = "pytest-cov", marker = "python_full_version >= '3.14'" },
    { name = "pytest-sugar", marker = "python_full_version >= '3.14'" },
]
ipython = [
    { name = "ipython", marker = "python_full_version >= '3.14'" },
]
mypy = [
    { name = "mypy", extra = ["faster-cache"], marker = "python_full_version >= '3.14'" },
]
nox = [
    { name = "nox", marker = "python_full_version >= '3.14'" },
]
pylint = [
    { name = "pylint" },
]
pytest = [
    { name = "pytest" },
]
test = [
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "pytest-sugar" },
    { name = "tomli", marker = "python_full_version < '3.11'" },
]
test-extras = [
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "pytest-sugar" },
    { name = "tomli", marker = "python_full_version < '3.11'" },
]
type = [
    { name = "nox", marker = "python_full_version >= '3.14'" },
    { name = "pylint" },
    { name = "pytest" },
]

